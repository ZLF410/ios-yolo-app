name: Build iOS App
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          xcodebuild clean archive -scheme "ReflectiveClothes" -archivePath ./output.xcarchive CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          mkdir Payload
          cp -r ./output.xcarchive/Products/Applications/ReflectiveClothes.app Payload/
          zip -r ReflectiveClothes.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ReflectiveClothesIPA
          path: "ReflectiveClothes.ipa"
